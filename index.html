<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Game em Java</title>
    <link rel="stylesheet" href="css/style.css">
</head>



<body>

<div id="menu">
    <h1>Monster Survival</h1>
    <button id="startButton">JOGAR</button>
</div>

<button id="fullscreenBtn">Tela cheia</button>


<canvas id="gameCanvas"></canvas>

<style>
    #menu {
        position: absolute;
        top: 0; left: 0;
        width: 800px; height: 400px;
        background: rgba(0,0,0,0.8);
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
    }
</style>

<div id="mobileControls">
    <button id="btnLeft">◀</button>
    <button id="btnRight">▶</button>
    <button id="btnJump">⤴</button>
    <button id="btnShoot">🔥</button>
</div>

<script type="module" src="js/main.js"></script>

<!-- ✅ SCRIPT FULLSCREEN NO FINAL -->
<script>
const btn = document.getElementById("fullscreenBtn");

if (btn) {
    btn.addEventListener("click", async () => {
        try {
            const elem = document.documentElement;

            if (!document.fullscreenElement) {
                await elem.requestFullscreen();
            } else {
                await document.exitFullscreen();
            }
        } catch (err) {
            console.log("Erro fullscreen:", err);
        }
    });
}
</script>

</body>
</html>
